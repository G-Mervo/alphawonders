services:
  app:
    image: ghcr.io/g-mervo/alphawonders:latest
    container_name: alphawonders-app
    restart: unless-stopped
    expose:
      - "8080"                          # internal only — nginx-proxy routes traffic here
    environment:
      - CI_ENVIRONMENT=production
      # App
      - app.baseURL=${APP_BASE_URL}
      - app.forceGlobalSecureRequests=false
      - app.defaultLocale=en
      - app.negotiateLocale=false
      - app.supportedLocales=[en]
      - app.appTimezone=Africa/Nairobi
      - app.charset=UTF-8
      # Database
      - database.default.hostname=postgres
      - database.default.database=${DB_DATABASE}
      - database.default.username=${DB_USERNAME}
      - database.default.password=${DB_PASSWORD}
      - database.default.DBDriver=Postgre
      - database.default.port=5432
      - database.default.DBPrefix=
      - database.default.charset=utf8
      # Email (SMTP)
      - email.fromEmail=${SMTP_FROM_EMAIL}
      - email.fromName=${SMTP_FROM_NAME}
      - email.protocol=smtp
      - email.SMTPHost=${SMTP_HOST}
      - email.SMTPUser=${SMTP_USER}
      - email.SMTPPass=${SMTP_PASS}
      - email.SMTPPort=${SMTP_PORT}
      - email.SMTPCrypto=${SMTP_CRYPTO}
    volumes:
      - app-writable:/var/www/html/writable
      - app-uploads:/var/www/html/public/uploads
    networks:
      - shared-services
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scheduler:
    image: ghcr.io/g-mervo/alphawonders:latest
    container_name: alphawonders-scheduler
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    entrypoint: ["sh", "-c", "mkdir -p /var/www/html/writable/{cache,logs,session,uploads,debugbar} && chmod -R 775 /var/www/html/writable && while true; do php /var/www/html/spark content:publish-scheduled 2>&1; sleep 60; done"]
    environment:
      - CI_ENVIRONMENT=production
      - database.default.hostname=postgres
      - database.default.database=${DB_DATABASE}
      - database.default.username=${DB_USERNAME}
      - database.default.password=${DB_PASSWORD}
      - database.default.DBDriver=Postgre
      - database.default.port=5432
      - database.default.DBPrefix=
      - database.default.charset=utf8
      - app.baseURL=${APP_BASE_URL}
      - app.appTimezone=Africa/Nairobi
      - app.forceGlobalSecureRequests=false
      - app.defaultLocale=en
      - app.charset=UTF-8
    volumes:
      - app-writable:/var/www/html/writable
    networks:
      - shared-services

volumes:
  app-writable:
  app-uploads:

networks:
  shared-services:
    external: true
