# ──────────────────────────────────────────────────────────────
# Shared Infrastructure Stack
# Lives at ~/infra/ on the EC2 instance.
#
# Contains:
#   - PostgreSQL 18   (shared relational DB for all apps)
#   - MongoDB 8       (shared document store for all apps)
#   - Redis 8         (shared cache / message broker for all apps)
#   - Nginx           (reverse proxy, routes domains to app containers)
#
# SSL is handled by CloudFront + ACM — Nginx only serves HTTP.
#
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d
# ──────────────────────────────────────────────────────────────

services:
  # ── Database ──
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shared-services
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MongoDB (shared document store for all apps) ──
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    networks:
      - shared-services
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.hello()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Redis (shared cache / message broker for all apps) ──
  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    command: >-
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - shared-services
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Reverse Proxy (HTTP only — CloudFront + ACM handles SSL) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - shared-services
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  mongodata:
  redisdata:

networks:
  shared-services:
    name: shared-services
    driver: bridge
