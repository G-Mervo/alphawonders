# Rate limiting: 10 requests/second per IP, burst of 20
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block WordPress scanners and common exploit probes — drop connection instantly
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-login\.php|wp-config\.php|xmlrpc\.php|wp-cron\.php|wp-blog\.php|wp-editor\.php|wp-themes\.php|wp-good\.php) {
        access_log off;
        log_not_found off;
        return 444;
    }

    # Block common backdoor/shell probes
    location ~* \.(asp|aspx|jsp|cgi|env)$ {
        access_log off;
        log_not_found off;
        return 444;
    }

    # Backward compatibility: old attachments URLs → uploads
    location /attachments/ {
        alias /var/www/html/public/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        limit_req zone=general burst=20 nodelay;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
